project_name:
  type: str
  help: "Name ur project (Use snake_case)."
  default: "prj"

python_version:
  type: str
  help: "Python version to use."
  default: "3.12"
  choices:
    - "3.10"
    - "3.11"
    - "3.12"
    - "3.13"

_exclude:
  - ".git"
  - "copier.yaml"
  - "/README.md"

_templates_suffix: ""

_tasks:
  - ["cd", "{{ project_name }}", "&&", "ln", "-s", ".codex", ".claude"]
  - ["cd", "{{ project_name }}", "&&", "ln", "-s", "AGENTS.md", "CLAUDE.md"]
  - ["cd", "{{ project_name }}", "&&", "make", "sync"]
